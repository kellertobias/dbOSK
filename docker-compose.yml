services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: dbosk
      POSTGRES_PASSWORD: dbosk
      POSTGRES_DB: dbosk_test
    ports:
      - "54329:5432"
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: dbosk
      MYSQL_DATABASE: dbosk_test
    ports:
      - "33069:3306"
    profiles: ["phase4"]
  mongo:
    image: mongo:7
    ports:
      - "27019:27017"
    profiles: ["phase4"]
  redis:
    image: redis:7
    ports:
      - "63799:6379"
    profiles: ["phase8"]
  dynamodb:
    image: amazon/dynamodb-local
    ports:
      - "8009:8000"
    profiles: ["phase8"]
  # SSH bastion for tunnel tests: key-only auth with the committed
  # Tests/Fixtures/test_tunnel_key; forwards to the postgres service.
  ssh:
    image: alpine:3
    command: >
      sh -c "apk add --no-cache openssh &&
             ssh-keygen -A &&
             adduser -D tunnel &&
             sed -i 's/tunnel:!/tunnel:*/' /etc/shadow &&
             mkdir -p /home/tunnel/.ssh &&
             echo 'ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAINXZc3oetlIoKMdcD1/gpjNZ/85zGyOorAkBSz6M5wvc dbosk-test-only' > /home/tunnel/.ssh/authorized_keys &&
             chown -R tunnel /home/tunnel/.ssh &&
             chmod 700 /home/tunnel/.ssh && chmod 600 /home/tunnel/.ssh/authorized_keys &&
             /usr/sbin/sshd -D -e -o AllowTcpForwarding=yes"
    ports:
      - "22022:22"
    profiles: ["ssh"]
