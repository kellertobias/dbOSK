name: Release

# Forgejo owns semantic versioning ONLY — it derives the next version from the
# Conventional Commit messages on main and creates the v* git tag. It deliberately
# does NOT build the app, so this pipeline needs no macOS runner and runs entirely on
# a Linux runner.
#
# The tag is push-mirrored to GitHub, where the actual macOS build + release happens
# (see .github/workflows/release.yml).
#
# Loop prevention: the release commit push does re-trigger this workflow once, but the
# next version is computed from the range since the latest git tag (see
# Scripts/bump-version.sh). The v* tag points at the release commit, so that re-run finds
# zero commits since the tag and exits without releasing (a harmless no-op run).
#
# We deliberately do NOT add a "[skip ci]" marker to the release commit: the mirrored v*
# tag points at that same commit, and GitHub Actions honors [skip ci] on a tag's commit —
# which would silently skip the GitHub build and never publish the release.

on:
  push:
    branches: [main]

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4
        with:
          # Full history + tags so `git describe` and the commit-range scan work.
          fetch-depth: 0
          # A token with contents:write is required to push the release commit and
          # tag back to the protected main branch. Configure the SEMANTIC_RELEASE_TOKEN
          # repository secret; the automatic token cannot push to a protected branch.
          token: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}

      - name: Compute next version
        id: bump
        run: |
          new="$(bash Scripts/bump-version.sh)"
          echo "version=$new" >> "$GITHUB_OUTPUT"
          echo "Next version: $new"

      - name: Commit, tag and push
        run: |
          set -euo pipefail
          new="${{ steps.bump.outputs.version }}"
          if git diff --quiet -- VERSION; then
            echo "VERSION unchanged; no release-worthy commits since the last tag."
            exit 0
          fi
          git config user.name  "Forgejo CI"
          git config user.email "ci@tokenet.de"
          git add VERSION
          git commit -m "chore(release): v$new"
          git tag -a "v$new" -m "v$new"
          git push origin HEAD:main
          git push origin "v$new"
